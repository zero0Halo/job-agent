<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{TITLE}}</title>

    <style>
      body {
        background: #f1f1f1;
        font-family: system-ui, sans-serif;
        line-height: 1.6;
        margin-bottom: 40px;
      }

      main {
        background: #fff;
        margin: 40px auto;
        max-width: 800px;
        padding: 0 24px;
        position: relative;
      }

      h1 {
        margin-right: 1rem;
      }

      p {
        font-size: 1.25rem;
      }

      li {
        font-size: 1.35rem;
      }

      .code-block-container {
        position: relative;
      }

      .language-text {
        background: #f4f4f4;
        border-radius: 8px;
        display: block;
        overflow-x: auto;
        padding: 16px;
        position: relative;
        white-space: break-spaces;
      }

      .copy-button {
        cursor: pointer;
        font-size: 0.75rem;
        padding: 4px 8px;
        position: absolute;
        right: 8px;
        top: 8px;
        z-index: 1;
      }
    </style>

    <script>
      (() => {
        console.log("Script loaded");

        function createCopyButton(fn) {
          const copyButton = document.createElement("button");
          copyButton.classList.add("copy-button");
          copyButton.textContent = "Copy";

          if (fn) {
            copyButton.addEventListener("click", fn);
          }

          return copyButton;
        }

        document.addEventListener("DOMContentLoaded", () => {
          const mainElement = document.querySelector("main");
          const h1Element = mainElement.querySelector("h1");

          if (h1Element) {
            const [jobTitle, companyName] = h1Element.textContent
              .split("|")
              .map((s) => s.trim());
            const urlElement = h1Element.nextElementSibling;
            const url = urlElement?.innerText.split(": ")?.at(1);
            const dateElement = urlElement?.nextElementSibling;
            const date = dateElement?.innerText.split(": ")?.at(1);
            const copyButton = createCopyButton(() => {
              navigator.clipboard
                .writeText(`${companyName}\t${jobTitle}\t${url}\t${date}`)
                .then(() => {
                  alert("Successfully copied to clipboard!\n");
                })
                .catch((err) => {
                  console.error("Failed to copy to clipboard: ", err);
                });
            });

            mainElement.appendChild(copyButton);
          } else {
            console.error("Failed to find the main heading element.");
          }
        });

        document.addEventListener("DOMContentLoaded", () => {
          const codeBlock = document.querySelector(".language-text");
          codeBlock.parentNode.classList.add("code-block-container");

          if (codeBlock) {
            const copyButton = createCopyButton(() => {
              navigator.clipboard
                .writeText(codeBlock.innerText)
                .then(() => {
                  alert("Successfully copied to clipboard!\n");
                })
                .catch((err) => {
                  console.error("Failed to copy to clipboard: ", err);
                });
            });

            codeBlock.parentNode.appendChild(copyButton);
          }
        });
      })();
    </script>
  </head>
  <body>
    <main>{{BODY}}</main>
  </body>
</html>
